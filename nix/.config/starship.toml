"$schema" = 'https://starship.rs/config-schema.json'

#? https://starship.rs/config/#default-prompt-format
format = """
$username\
$os\
$hostname\
$localip\
$shlvl\
$singularity\
$kubernetes\
$nats\
$directory\
$vcsh\
$fossil_branch\
$fossil_metrics\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$hg_branch\
$hg_state\
$pijul_channel\
$docker_context\
$package\
$guix_shell\
$nix_shell\
$memory_usage\
$aws\
$gcloud\
$openstack\
$azure\
$direnv\
$env_var\
$mise\
$crystal\
$custom\
$sudo\
$fill\
$cmd_duration\
$line_break\
$jobs\
$battery\
$time\
$status\
$container\
$netns\
$shell\
$character"""

continuation_prompt ="[:|](bright-black) "
add_newline = true

[fill]
symbol = " "

[username]
show_always = true
format = "[$user]($style) "
aliases = { "Administrator" = "root" }

[os]
disabled = false

[os.symbols]
#? https://www.nerdfonts.com/cheat-sheet
Windows = "[](#0078D4) "
Linux = "[](fg:black bg:white) "
Macos = "[](white) "
Arch = "[󰣇](#1793d1) "
Ubuntu = "[󰕈](#E95420) "
NixOS = "[](#5277C3) "

[hostname]
ssh_only = false
format = "[$hostname]($style) at "

[character]
error_symbol = '[:\(](bold red)'
success_symbol = '[:\)](bold green)'

[cmd_duration]
min_time = 0
show_milliseconds = true

[battery]
disabled = false

[[battery.display]]
threshold = 90
style = "bold red"

[sudo]
disabled = false

# TODO colors https://starship.rs/presets/pastel-powerline.html
[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '

# https://gist.github.com/ryo-ARAKI/48a11585299f9032fa4bda60c9bba593
[git_status]
conflicted = "⚔️"
ahead = "🏎️💨×${count}"
behind = "🐢×${count}"
diverged = "🔱🏎️💨×${ahead_count}🐢×${behind_count}"
untracked = "🛤️×${count}"
stashed = "📦"
modified = "📝×${count}"
staged = "🗃️×${count}"
renamed = "📛×${count}"
deleted = "🗑️×${count}"
style = "bright-white"
format = '\[$all_status$ahead_behind\] '
windows_starship = "starship.exe"

# https://gist.github.com/fitrh/f8c70203e3bca142d52a585e34f0248d
[custom.git_host]
command = '$XDG_CONFIG_HOME/starship/starship.bash'
detect_folders = [".git"]
when = 'git rev-parse --is-inside-work-tree && git ls-remote --get-url'
os = "linux"
shell = ["bash","--norc","--noprofile"]
style = "bright-yellow bold"
format = "in [$output]($style) "

[custom.git_host_win]
command = '%userprofile%\.config\starship\starship.bat'
detect_folders = [".git"]
when = 'git rev-parse --is-inside-work-tree && git ls-remote --get-url'
os = "windows"
shell = ["cmd"]
style = "bright-yellow bold"
format = "in [$output]($style) "

[aws]
symbol = "  "

[buf]
symbol = " "

[c]
symbol = " "

[conda]
symbol = " "

[dart]
symbol = " "

[directory]
read_only = " "

[docker_context]
symbol = " "

[elixir]
symbol = " "

[elm]
symbol = " "

[git_branch]
symbol = " "

[golang]
symbol = " "

[haskell]
symbol = " "

[hg_branch]
symbol = " "

[java]
symbol = " "

[julia]
symbol = " "

[memory_usage]
symbol = " "

[nim]
symbol = " "

[nix_shell]
symbol = " "
style = "bold #7EBAE4"

[nodejs]
symbol = " "

[package]
symbol = " "

[python]
symbol = " "

[spack]
symbol = "🅢 "

[rust]
symbol = " "
